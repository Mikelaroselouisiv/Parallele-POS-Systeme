# Stack EC2 : même Postgres que docker-compose.yml local (postgres:16, pos_db),
# + backend depuis ECR. Déployer sur le serveur après login ECR.
#
# Sur l’instance :
#   cd ~/pos-docker   # ou le dossier où tu copies ce fichier
#   cp .env.ec2.example .env.ec2 && nano .env.ec2   # JWT_SECRET obligatoire
#   docker compose -f docker-compose.ec2.yml --env-file .env.ec2 up -d
#
# Le port 5432 n’est exposé que sur localhost (127.0.0.1) pour éviter d’ouvrir
# Postgres sur Internet. L’API est sur 0.0.0.0:3000 (ouvre le SG EC2 sur 3000).

services:
  postgres:
    image: postgres:16
    container_name: pos_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pos_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: 421983920969.dkr.ecr.us-east-2.amazonaws.com/freresbasilespos:latest
    container_name: pos_backend
    restart: unless-stopped
    env_file:
      - .env.ec2
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pos_db?schema=public
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  postgres_data:
