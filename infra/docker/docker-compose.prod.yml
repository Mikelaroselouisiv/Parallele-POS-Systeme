# Production locale (ou tout serveur avec Docker) : Postgres + image backend depuis ECR.
# Pas de build : il faut d’abord s’authentifier auprès d’ECR, puis pull.
#
# Même dépôt que la CI (.github/workflows/backend-ecr.yml) : freresbasilespos, us-east-2.
# Si ton URI change, modifie la ligne `image:` ci‑dessous ou utilise une variable d’environnement
# (Compose lit un fichier `.env` à côté du compose pour l’interpolation ; voir doc Docker).
#
# Étapes :
#   cd infra/docker
#   cp .env.prod.example .env.prod && nano .env.prod
#   aws ecr get-login-password --region us-east-2 | docker login --username AWS --password-stdin 421983920969.dkr.ecr.us-east-2.amazonaws.com
#   docker compose -f docker-compose.prod.yml --env-file .env.prod pull
#   docker compose -f docker-compose.prod.yml --env-file .env.prod up -d
#
# Arrêt : docker compose -f docker-compose.prod.yml down

services:
  postgres:
    image: postgres:16
    container_name: pos_postgres_prod
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: pos_db
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data

  backend:
    image: 421983920969.dkr.ecr.us-east-2.amazonaws.com/freresbasilespos:latest
    container_name: pos_backend_prod
    restart: unless-stopped
    env_file:
      - .env.prod
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/pos_db?schema=public
      PORT: "3000"
    ports:
      - "3000:3000"
    depends_on:
      - postgres

volumes:
  postgres_data_prod:
