# Développement : uniquement le backend en conteneur. La base est PostgreSQL sur l’EC2
# (compose prod), joignable via tunnel SSH sur la machine hôte (port 15432 par défaut).
#
# 1) Terminal : infra/scripts/ec2-db-tunnel.ps1 (ou .sh) — laisser ouvert
# 2) cd infra/docker && docker compose up --build -d
#
# Sans Docker : dans apps/backend, npm run start:dev (même DATABASE_URL sur 127.0.0.1:15432).
#
# Production / stack complet sur une machine : docker-compose.prod.yml

services:
  backend:
    build:
      context: ../../apps/backend
      dockerfile: ../../infra/docker/Dockerfile
    container_name: pos_backend
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    env_file:
      - ../../apps/backend/.env
    environment:
      # Contournement : depuis le conteneur, l’hôte = host.docker.internal (tunnel sur 15432).
      DATABASE_URL: postgresql://postgres:postgres@host.docker.internal:15432/pos_db?schema=public
    ports:
      - "3000:3000"
