# Build desktop Remote, generate latest.yml, upload to GCS installers/remote/.
# Optional: workflow_dispatch with edition=server uploads to installers/server/ (no auto-updater).
#
# Secrets: GCP_SA_KEY, GCP_PROJECT_ID
# Variables: GCP_REGION (for auth action consistency)

name: Desktop - release to GCS

on:
  workflow_dispatch:
    inputs:
      edition:
        description: 'Flavor desktop'
        required: true
        default: remote
        type: choice
        options:
          - remote
          - server
  push:
    tags:
      - 'desktop-v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Install dependencies
        working-directory: apps/desktop
        run: npm ci

      - name: Resolve edition
        id: meta
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            echo "edition=${{ inputs.edition }}" >> "$GITHUB_OUTPUT"
          else
            echo "edition=remote" >> "$GITHUB_OUTPUT"
          fi

      - name: Build Windows installer
        working-directory: apps/desktop
        run: npm run dist:win:${{ steps.meta.outputs.edition }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Configure Google Cloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Upload to GCS
        shell: pwsh
        run: |
          $edition = '${{ steps.meta.outputs.edition }}'
          & ./infra/scripts/upload-desktop-installer.ps1 -Edition $edition
