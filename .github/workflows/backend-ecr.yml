# Build Docker backend → push to Amazon ECR.
# Secrets requis : AWS_ACCESS_KEY_ID, AWS_SECRET_ACCESS_KEY (IAM avec droits ECR sur ce compte).
# Optionnel : variables repo AWS_REGION / ECR_REPOSITORY pour surcharger les défauts ci‑dessous.

name: Backend — build & push ECR

on:
  push:
    branches: [main]
    paths:
      - 'apps/backend/**'
      - 'infra/docker/Dockerfile'
      - '.github/workflows/backend-ecr.yml'
  workflow_dispatch:

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-2' }}
  ECR_REPOSITORY: ${{ vars.ECR_REPOSITORY || 'freresbasilespos' }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          set -euo pipefail
          docker build -f infra/docker/Dockerfile \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" \
            -t "$ECR_REGISTRY/$ECR_REPOSITORY:latest" \
            apps/backend
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG"
          docker push "$ECR_REGISTRY/$ECR_REPOSITORY:latest"
